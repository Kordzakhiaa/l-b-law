@if (showScrollTop()) {
  <button
    (click)="scrollToTop()"
    class="fixed bottom-6 right-6 z-40 w-11 h-11 rounded-full bg-accent-500 hover:bg-accent-600 text-white shadow-lg hover:shadow-xl transition-all duration-300 flex items-center justify-center cursor-pointer"
  >
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
    </svg>
  </button>
}
