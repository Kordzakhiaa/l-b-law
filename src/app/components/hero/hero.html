<section id="hero" class="relative min-h-screen flex items-center overflow-hidden">
  <!-- Background Slideshow -->
  @for (slide of slides; track $index) {
    <div
      class="absolute inset-0 bg-cover bg-center transition-opacity duration-1000 ease-in-out"
      [style.background-image]="'url(' + slide + ')'"
      [class.opacity-100]="activeSlide() === $index"
      [class.opacity-0]="activeSlide() !== $index"
    ></div>
  }

  <!-- Dark overlay on top of slideshow -->
  <div class="absolute inset-0 bg-primary-950/55"></div>
  <div
    class="absolute inset-0 bg-gradient-to-br from-primary-950/60 via-primary-900/35 to-primary-800/25"
  ></div>

  <!-- Decorative elements -->
  <div class="absolute top-20 right-10 w-72 h-72 bg-accent-500/10 rounded-full blur-3xl"></div>
  <div class="absolute bottom-20 left-10 w-96 h-96 bg-secondary-500/10 rounded-full blur-3xl"></div>

  <!-- Content — centered, full width -->
  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-32 w-full">
    <div class="max-w-3xl mx-auto text-center lg:text-left lg:mx-0">
      <div
        class="inline-flex items-center gap-2 bg-accent-500/20 text-accent-300 rounded-full px-4 py-1.5 text-sm font-medium mb-8"
      >
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
          <path d="M10 2L3 7v11h14V7l-7-5zM10 4.236L15 7.764V16H5V7.764L10 4.236z" />
        </svg>
        {{ 'FOOTER.FIRM_NAME' | translate }}
      </div>

      <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold text-white leading-tight mb-6">
        {{ 'HERO.TITLE' | translate }}
      </h1>

      <p class="text-lg text-neutral-300 leading-relaxed mb-10 max-w-lg mx-auto lg:mx-0">
        {{ 'HERO.SUBTITLE' | translate }}
      </p>

      <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 justify-center lg:justify-start">
        <a
          (click)="scrollTo('services')"
          class="inline-flex items-center justify-center gap-2 bg-accent-500 hover:bg-accent-600 text-white font-semibold px-6 py-3 sm:px-8 sm:py-4 rounded-xl transition-all duration-200 shadow-lg shadow-accent-500/25 hover:shadow-accent-500/40 hover:-translate-y-0.5 text-sm sm:text-base cursor-pointer"
        >
          {{ 'HERO.CTA_SECONDARY' | translate }}
        </a>
      </div>
    </div>

    <!-- Slide Indicators -->
    <div class="flex gap-2 mt-16 justify-center lg:justify-start">
      @for (slide of slides; track $index) {
        <button
          (click)="activeSlide.set($index)"
          class="h-1.5 rounded-full transition-all duration-300"
          [class.w-8]="activeSlide() === $index"
          [class.bg-accent-500]="activeSlide() === $index"
          [class.w-3]="activeSlide() !== $index"
          [class.bg-white/40]="activeSlide() !== $index"
        ></button>
      }
    </div>
  </div>

  <!-- Scroll Indicator -->
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 animate-bounce">
    <svg
      class="w-6 h-6 text-white/50"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
    </svg>
  </div>
</section>
