<section id="lawyers" class="snap-section py-24 bg-primary-950">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Section Header -->
    <div class="text-center mb-16">
      <span class="inline-block text-accent-400 font-semibold text-sm tracking-widest uppercase mb-3">
        {{ 'LAWYERS.LABEL' | translate }}
      </span>
      <h2 class="text-3xl sm:text-4xl lg:text-5xl font-bold text-white mb-6">
        {{ 'LAWYERS.TITLE' | translate }}
      </h2>
      <p class="text-lg text-neutral-400 max-w-2xl mx-auto">
        {{ 'LAWYERS.SUBTITLE' | translate }}
      </p>
      <div class="w-20 h-1 bg-accent-500 mx-auto rounded-full mt-6"></div>
    </div>

    <!-- Lawyers Grid -->
    <div class="grid md:grid-cols-3 gap-8">
      @for (lawyer of lawyers; track lawyer.nameKey) {
        <div class="group relative h-full">
          <!-- Card -->
          <div class="relative overflow-hidden rounded-2xl bg-primary-900 border border-primary-800 hover:border-accent-500/50 transition-all duration-500 h-full flex flex-col">
            <!-- Photo -->
            <div class="relative h-80 overflow-hidden shrink-0">
              <img
                [src]="lawyer.image"
                [alt]="lawyer.nameKey | translate"
                class="w-full h-full object-cover object-top group-hover:scale-105 transition-transform duration-700"
              />
              <div class="absolute inset-0 bg-linear-to-t from-primary-950 via-primary-950/20 to-transparent"></div>
            </div>

            <!-- Info -->
            <div class="relative p-6 -mt-12 flex flex-col flex-1">
              <h3 class="text-xl font-bold text-white mb-1">
                {{ lawyer.nameKey | translate }}
              </h3>
              <p class="text-accent-400 font-medium text-sm mb-4">
                {{ lawyer.roleKey | translate }}
              </p>
              <p class="text-neutral-400 text-sm leading-relaxed flex-1">
                {{ lawyer.descKey | translate }}
              </p>

              <!-- Social Links -->
              <div class="flex gap-3 mt-5">
                <a class="w-9 h-9 rounded-lg bg-primary-800 hover:bg-accent-500 flex items-center justify-center transition-colors duration-200 cursor-pointer">
                  <svg class="w-4 h-4 text-neutral-400 hover:text-white" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                  </svg>
                </a>
                <a class="w-9 h-9 rounded-lg bg-primary-800 hover:bg-accent-500 flex items-center justify-center transition-colors duration-200 cursor-pointer">
                  <svg class="w-4 h-4 text-neutral-400 hover:text-white" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
                  </svg>
                </a>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
